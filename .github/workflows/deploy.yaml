name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/64259620414/locations/global/workloadIdentityPools/github-actions-pool-house-price/providers/github-provider
          service_account: github-actions-deployer@project-bcbc2032-5903-4284-b7a.iam.gserviceaccount.com

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build -t jai302golu/house-price-prediction-api:latest .

      - name: Push Docker Image
        run: |
          docker push jai302golu/house-price-prediction-api:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy house-price-prediction-api \
            --image docker.io/jai302golu/house-price-prediction-api:latest \
            --platform managed \
            --region southamerica-east1 \
            --allow-unauthenticated